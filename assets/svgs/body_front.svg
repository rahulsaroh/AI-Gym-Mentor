<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400">
  <!-- Body Front SVG -->
  <g id="body-front">
    <!-- Head -->
    <ellipse id="head" cx="100" cy="30" rx="20" ry="25" fill="#D3D1C7"/>
    <!-- Neck -->
    <rect id="neck" x="90" y="55" width="20" height="15" fill="#D3D1C7"/>
    <!-- Chest / Pectorals -->
    <path id="pectoralis-major" d="M70 75 Q100 85 130 75 L130 100 Q100 110 70 100 Z" fill="#D3D1C7"/>
    <!-- Shoulders - Front -->
    <ellipse id="deltoid-anterior" cx="60" cy="75" rx="15" ry="12" fill="#D3D1C7"/>
    <ellipse id="deltoid-anterior-right" cx="140" cy="75" rx="15" ry="12" fill="#D3D1C7"/>
    <!-- Arms - Biceps -->
    <ellipse id="biceps-brachii" cx="50" cy="110" rx="10" ry="25" fill="#D3D1C7"/>
    <ellipse id="biceps-brachii-right" cx="150" cy="110" rx="10" ry="25" fill="#D3D1C7"/>
    <!-- Forearms -->
    <ellipse id="forearms" cx="45" cy="150" rx="8" ry="25" fill="#D3D1C7"/>
    <ellipse id="forearms-right" cx="155" cy="150" rx="8" ry="25" fill="#D3D1C7"/>
    <!-- Abs / Core -->
    <path id="rectus-abdominis" d="M85 105 L115 105 L115 160 L85 160 Z" fill="#D3D1C7"/>
    <!-- Obliques -->
    <path id="obliques" d="M70 105 L85 105 L85 160 L70 150 Z" fill="#D3D1C7"/>
    <path id="obliques-right" d="M115 105 L130 105 L130 150 L115 160 Z" fill="#D3D1C7"/>
    <!-- Hip flexors -->
    <path id="iliopsoas" d="M75 160 L95 160 L95 180 L75 175 Z" fill="#D3D1C7"/>
    <path id="iliopsoas-right" d="M105 160 L125 160 L125 175 L105 180 Z" fill="#D3D1C7"/>
    <!-- Quads -->
    <ellipse id="quadriceps" cx="75" cy="230" rx="18" ry="45" fill="#D3D1C7"/>
    <ellipse id="quadriceps-right" cx="125" cy="230" rx="18" ry="45" fill="#D3D1C7"/>
    <!-- Calves -->
    <ellipse id="gastrocnemius" cx="75" cy="320" rx="12" ry="35" fill="#D3D1C7"/>
    <ellipse id="gastrocnemius-right" cx="125" cy="320" rx="12" ry="35" fill="#D3D1C7"/>
  </g>
</svg>
